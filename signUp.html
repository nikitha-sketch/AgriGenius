<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgriMart Sign Up</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url('/home/rguktrkvalley/Desktop/agri1.jpeg');
      background-repeat: no-repeat;
      background-position: center center;
      background-attachment: fixed;
      background-size: cover;
      margin: 0;
      height: 100vh;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .lang-select {
      position: absolute;
      top: 20px;
      right: 30px;
      z-index: 3;
    }

    .container {
      position: relative;
      z-index: 2;
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      margin: auto;
      top: 15%;
      text-align: center;
    }

    input, button, select {
      margin: 10px 0;
      padding: 10px;
      width: 100%;
    }

    button {
      background-color: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <!-- Language Selector Outside Form -->
  <div class="lang-select">
    <label for="lang">🌐</label>
    <select id="lang" onchange="changeLanguage(this.value)">
      <option value="en">English</option>
      <option value="hi">हिन्दी</option>
      <option value="te">తెలుగు</option>
      <option value="ml">മലയാളം</option>
      <option value="ta">தமிழ்</option>
    </select>
  </div>

  <div class="container">
    <h2 id="title">Sign Up for AgriMart</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="text" id="address" placeholder="Address">
    <input type="mail" id="email" placeholder="email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()"><span id="signupBtn">Sign Up</span></button>
    <p style="margin-top: 10px;">Already have an account? <a href="login.html">Sign in</a></p>

  </div>

  <script>
    const translations = {
      en: {
        title: "Sign Up for AgriMart",
        name: "Full Name",
        phone: "Phone Number",
        address: "Address",
        username: "Username",
        password: "Password",
        signupBtn: "Sign Up"
      },
      hi: {
        title: "एग्रीमार्ट के लिए साइन अप करें",
        name: "पूरा नाम",
        phone: "फ़ोन नंबर",
        address: "पता",
        username: "उपयोगकर्ता नाम",
        password: "पासवर्ड",
        signupBtn: "साइन अप करें"
      },
      te: {
        title: "AgriMart కోసం సైన్ అప్ చేయండి",
        name: "పూర్తి పేరు",
        phone: "ఫోన్ నంబర్",
        address: "చిరునామా",
        username: "వినియోగదారుని పేరు",
        password: "పాస్వర్డ్",
        signupBtn: "సైన్ అప్"
      },
      ta: {
        title: "அக்ரிமார்ட் இல் பதிவு செய்யவும்",
        name: "முழு பெயர்",
        phone: "தொலைபேசி எண்",
        address: "முகவரி",
        username: "பயனர்பெயர்",
        password: "கடவுச்சொல்",
        signupBtn: "பதிவு செய்க"
      },
      ml: {
        title: "അഗ്രിമാർട്ടിലേക്ക് സൈൻ അപ്പ് ചെയ്യുക",
        name: "പൂര്‍ണനാമം",
        phone: "ഫോൺ നമ്പർ",
        address: "വിലാസം",
        username: "ഉപയോക്തൃനാമം",
        password: "പാസ്വേഡ്",
        signupBtn: "സൈൻ അപ്പ്"
      }
    };

    function changeLanguage(lang) {
      localStorage.setItem("lang", lang);
      const t = translations[lang];
      document.getElementById("title").innerText = t.title;
      document.getElementById("name").placeholder = t.name;
      document.getElementById("phone").placeholder = t.phone;
      document.getElementById("address").placeholder = t.address;
      document.getElementById("username").placeholder = t.username;
      document.getElementById("password").placeholder = t.password;
      document.getElementById("signupBtn").innerText = t.signupBtn;
    }

    function signup() {
      // You can handle user data submission here (e.g., send to backend)
      alert("Signed up successfully!");
      window.location.href = "login.html";
    }

    window.onload = () => {
      const savedLang = localStorage.getItem("lang") || "en";
      document.getElementById("lang").value = savedLang;
      changeLanguage(savedLang);
    };
     document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;

      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPassword", password);
      localStorage.setItem("isLoggedIn", true);

      window.location.href = "login.html";
    });
    
  </script>
</body>
</html>
